name: Sync from Upstream

on:
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://git.centerionware.com/0xdeadc0de/evmon.git
          git fetch upstream

      - name: Create PR branch with upstream changes
        run: |
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
          echo "Upstream default branch: $UPSTREAM_BRANCH"

          # Create new branch for the PR
          git checkout -b sync-from-upstream

          # Reset branch to upstream commit
          git reset --hard upstream/$UPSTREAM_BRANCH

          # Push branch to GitHub
          git push -u origin sync-from-upstream --force

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Sync from upstream"
          body: "This PR updates GitHub main with the latest changes from upstream."
          base: main
          head: sync-from-upstream
          draft: false