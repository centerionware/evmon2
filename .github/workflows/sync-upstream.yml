name: Sync from Upstream

on:
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://git.centerionware.com/0xdeadc0de/evmon.git
          git fetch upstream

      - name: Overwrite GitHub main with upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
          echo "Upstream default branch: $UPSTREAM_BRANCH"

          git checkout main
          git reset --hard upstream/$UPSTREAM_BRANCH

          # Push using the Actions token to avoid 403
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/centerionware/evmon.git main --force

      - name: Done
        run: echo "GitHub main branch successfully overwritten with upstream."