name: Sync from Upstream

on:
  workflow_dispatch: # manually triggered

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can commit

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://git.centerionware.com/0xdeadc0de/evmon.git
          git fetch upstream

      - name: Sync upstream changes
        run: |
          # Detect upstream default branch
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
          echo "Upstream default branch: $UPSTREAM_BRANCH"

          # Checkout GitHub main branch
          git checkout main

          # Pull changes from upstream, overwrite local files
          git reset --hard upstream/$UPSTREAM_BRANCH

          # Check if there are changes to commit
          if ! git diff --quiet; then
            git add -A
            git commit -m "Sync from upstream $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          else
            echo "No changes to sync from upstream."
          fi

      - name: Done
        run: echo "GitHub main branch synced with upstream."