name: Sync from Upstream

on:
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # get full history

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://git.centerionware.com/0xdeadc0de/evmon.git
          git fetch upstream --tags

      - name: Sync upstream changes
        run: |
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
          echo "Upstream branch: $UPSTREAM_BRANCH"

          # Checkout GitHub main
          git checkout main

          # Hard reset to GitHub origin/main first to ensure clean state
          git reset --hard origin/main

          # Pull upstream changes into local branch, favor upstream in conflicts
          git pull upstream $UPSTREAM_BRANCH --allow-unrelated-histories -X theirs

          # Push changes to GitHub main
          git push origin main