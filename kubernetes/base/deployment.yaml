apiVersion: apps/v1
kind: Deployment
metadata:
  name: evmon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evmon
  template:
    metadata:
      labels:
        app: evmon
    spec:
      serviceAccountName: evmon
      containers:
        - name: evmon
          image: ghcr.io/centerionware/evmon:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EVMON_DB_TYPE
              value: "sqlite"
            - name: EVMON_DATABASE_URL
              value: "file:/data/evmon.db?_foreign_keys=on&cache=shared"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: evmon-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: evmon-data
          persistentVolumeClaim:
            claimName: evmon-pvc